server {
  listen 80;
  server_name _;

  # Static files produced by `pnpm run build` in the Docker build stage.
  root /usr/share/nginx/html;
  index index.html;

  # Vite fingerprints built assets, so they can be cached aggressively.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
